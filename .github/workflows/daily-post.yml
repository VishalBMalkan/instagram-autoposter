name: Daily Instagram Post

on:
  schedule:
    # 09:00 IST = 03:30 UTC. GitHub cron is UTC — adjust as needed.
    - cron: "30 3 * * *"
  workflow_dispatch: {}   # manual "Run workflow" button for testing

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Post today's content
        env:
          RAW_BASE_URL: https://raw.githubusercontent.com/${{ github.repository }}/main
          IG_USER_ID_MINDYOURMONEY_6:   ${{ secrets.IG_USER_ID_MINDYOURMONEY_6 }}
          IG_TOKEN_MINDYOURMONEY_6:     ${{ secrets.IG_TOKEN_MINDYOURMONEY_6 }}
          IG_USER_ID_RSI_SECRET_1:      ${{ secrets.IG_USER_ID_RSI_SECRET_1 }}
          IG_TOKEN_RSI_SECRET_1:        ${{ secrets.IG_TOKEN_RSI_SECRET_1 }}
          IG_USER_ID_DAILYMONEYRITUAL:  ${{ secrets.IG_USER_ID_DAILYMONEYRITUAL }}
          IG_TOKEN_DAILYMONEYRITUAL:    ${{ secrets.IG_TOKEN_DAILYMONEYRITUAL }}
          IG_USER_ID_MONEYFESTCLUB_006: ${{ secrets.IG_USER_ID_MONEYFESTCLUB_006 }}
          IG_TOKEN_MONEYFESTCLUB_006:   ${{ secrets.IG_TOKEN_MONEYFESTCLUB_006 }}
          IG_USER_ID_INVESTOR_CLUB_01:  ${{ secrets.IG_USER_ID_INVESTOR_CLUB_01 }}
          IG_TOKEN_INVESTOR_CLUB_01:    ${{ secrets.IG_TOKEN_INVESTOR_CLUB_01 }}
        run: python scripts/post_daily.py
